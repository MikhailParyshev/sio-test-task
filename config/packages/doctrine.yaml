doctrine:
  dbal:
    driver: 'pdo_pgsql'
    server_version: '16'
    charset: utf8
    url: '%env(resolve:DATABASE_URL)%'

  orm:
    auto_generate_proxy_classes: true
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    mappings:
      App:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%'
        prefix: 'App\Entity'
